name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'helm/**'

jobs:
  
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22.5

      - name: Build the application
        run: go build -o app go-web-app

      - name: Run tests
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}    

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          files: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/go-web-app:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update image tag in Helm chart
        run: |
          sed -i "s/tag: .*/tag: \"v${{github.run_id}}\"/" helm/go-web-app-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "anirban banerjee"
          git config --global user.email "anirban.banerjeeuv@gmail.com"
          git add helm/go-web-app-chart/values.yaml
          git commit -m "Update image tag to v${{github.run_id}} in Helm chart"
          git push origin main